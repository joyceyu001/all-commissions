<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Homepage</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="sidebar">
<h3>Categories</h3>
<a onclick="showSection('digital')">Digital Art</a>
<a onclick="showSection('crochet')">Crochet</a>
<a onclick="showSection('jewelry')">Jewelry</a>
<a onclick="showSection('pottery')">Pottery</a>
<a onclick="showSection('music')">Music</a>
</div>

<div class="main">

<div id="digital" class="section active">
<h2>Digital Art</h2>
<button onclick="addCommission('digital-grid')">+ Add</button>
<div class="commission-grid" id="digital-grid"></div>
</div>

<div id="crochet" class="section">
<h2>Crochet</h2>
<button onclick="addCommission('crochet-grid')">+ Add</button>
<div class="commission-grid" id="crochet-grid"></div>
</div>

<div id="jewelry" class="section">
<h2>Jewelry</h2>
<button onclick="addCommission('jewelry-grid')">+ Add</button>
<div class="commission-grid" id="jewelry-grid"></div>
</div>

<div id="pottery" class="section">
<h2>Pottery</h2>
<button onclick="addCommission('pottery-grid')">+ Add</button>
<div class="commission-grid" id="pottery-grid"></div>
</div>

<div id="music" class="section">
<h2>Music</h2>
<button onclick="addCommission('music-grid')">+ Add</button>
<div class="commission-grid" id="music-grid"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
